<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity Web Player | Life Is A Fashion Show</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #231F20; /* Color de fondo que tenías */
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }
      #unity-canvas {
        width: 100vw;
        height: 56.25vw; /* Mantiene la proporción 16:9 */
        max-height: 100vh;
        max-width: 177.78vh; /* Mantiene la proporción 16:9 */
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <script src="Build/ProyectoWeb_Build.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/ProyectoWeb_Build.data",
        frameworkUrl: "Build/ProyectoWeb_Build.framework.js",
        codeUrl: "Build/ProyectoWeb_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Life Is A Fashion Show",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
