<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity Web Player | Life Is A Fashion Show</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        /* Permitimos que el cuerpo sea un poco más alto que la pantalla para habilitar el scroll */
        width: 100vw;
        height: 120vh; 
        background: #231F20;
        display: flex;
        justify-content: center;
        /* Alineamos arriba para que, al hacer scroll, el juego se vea bien */
        align-items: flex-start; 
        overflow-y: scroll; /* Habilitamos scroll vertical */
      }
      
      #unity-canvas {
        width: 100vw;
        height: 56.25vw;
        max-height: 90vh; /* Un poco menos de 100vh para dejar espacio al scroll */
        max-width: 177.78vh;
        object-fit: contain;
        margin-top: 10px; /* Un pequeño margen superior */
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <script src="Build/ProyectoWeb_Build.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/ProyectoWeb_Build.data",
        frameworkUrl: "Build/ProyectoWeb_Build.framework.js",
        codeUrl: "Build/ProyectoWeb_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Life Is A Fashion Show",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
